:root {
  /* ====================================================
     CORPORATE PALETTE — CEINYS mother brand
     ==================================================== */

  /* Brand primaries (from logo) */
  --ceinys-cian-500: #17AEE6;        /* logo house */
  --ceinys-cian-600: #1290C1;
  --ceinys-cian-700: #0E708F;
  --ceinys-cian-100: #CFE9F7;
  --ceinys-cian-050: #EAF6FC;

  --ceinys-naranja-500: #F29030;     /* logo buildings */
  --ceinys-naranja-600: #CF7414;
  --ceinys-naranja-700: #9F580A;
  --ceinys-naranja-100: #FADCBB;
  --ceinys-naranja-050: #FDF1E6;

  /* Grafito — the dominant ink, NOT the accents */
  --grafito-900: #1B1D22;            /* darkest, headlines */
  --grafito-800: #2A2D33;            /* body emphasis */
  --grafito-700: #3F4147;            /* logo wordmark color */
  --grafito-600: #595C63;            /* secondary text */
  --grafito-500: #7A7D85;            /* meta / labels */
  --grafito-400: #A6A8AE;            /* placeholders */
  --grafito-300: #D0D2D7;            /* dividers */
  --grafito-200: #E6E7EB;            /* borders */
  --grafito-100: #F2F3F5;            /* surfaces */
  --grafito-050: #F8F9FA;            /* page bg alt */

  --paper: #FFFFFF;
  --bone:  #FAF8F4;                  /* warm off-white — institutional warmth */

  /* Semantic */
  --color-success: #2E8B57;
  --color-warning: #C8810D;
  --color-danger:  #B23A2F;
  --color-info:    var(--ceinys-cian-600);

  /* Foreground / background semantic vars */
  --fg-1: var(--grafito-900);
  --fg-2: var(--grafito-700);
  --fg-3: var(--grafito-500);
  --fg-inverse: #FFFFFF;

  --bg-1: var(--paper);
  --bg-2: var(--bone);
  --bg-3: var(--grafito-100);
  --bg-ink: var(--grafito-900);

  --border-soft: var(--grafito-200);
  --border-strong: var(--grafito-300);

  /* Accent semantics — restrained corporate use */
  --accent-primary: var(--ceinys-cian-600);   /* links, focus, primary CTA underline */
  --accent-action:  var(--ceinys-naranja-500);/* CTAs only */
  --accent-action-hover: var(--ceinys-naranja-600);

  /* ====================================================
     TYPE
     ==================================================== */
  --font-display: 'Montserrat', system-ui, sans-serif;            /* wordmark, eyebrow, headlines (weight 800) */
  --font-sans:    'Montserrat', system-ui, -apple-system, 'Segoe UI', sans-serif;  /* body + UI (weight 400–600) */
  --font-serif:   'Playfair Display', Georgia, serif;             /* sub-brand only (Valle Sacta, Altos, Los Sauces) */
  --font-mono:    'JetBrains Mono', ui-monospace, monospace;      /* RUC, partidas, technical */

  /* Type scale (rem on 16px) — generous for institutional voice */
  --fs-display:   clamp(2.75rem, 5vw, 4.5rem);    /* 44–72 */
  --fs-h1:        clamp(2.25rem, 3.6vw, 3.25rem); /* 36–52 */
  --fs-h2:        clamp(1.75rem, 2.6vw, 2.25rem); /* 28–36 */
  --fs-h3:        1.5rem;     /* 24 */
  --fs-h4:        1.25rem;    /* 20 */
  --fs-h5:        1.0625rem;  /* 17 */
  --fs-body:      1rem;       /* 16 */
  --fs-small:     0.875rem;   /* 14 */
  --fs-meta:      0.75rem;    /* 12 — uppercase labels only */

  --lh-tight: 1.05;
  --lh-snug:  1.2;
  --lh-base:  1.55;
  --lh-loose: 1.7;

  --tracking-wide:   0.12em;   /* uppercase labels */
  --tracking-tight: -0.01em;   /* large display */

  /* ====================================================
     SPACING — 4pt grid
     ==================================================== */
  --space-1:  4px;
  --space-2:  8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-7: 32px;
  --space-8: 40px;
  --space-9: 48px;
  --space-10: 64px;
  --space-11: 80px;
  --space-12: 96px;
  --space-13: 128px;

  /* Layout */
  --container-max: 1240px;
  --container-narrow: 880px;
  --gutter: clamp(20px, 4vw, 48px);

  /* ====================================================
     RADII, SHADOWS, BORDERS
     ==================================================== */
  --radius-xs: 4px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-pill: 999px;

  /* Restrained shadow system — institutional, never floaty */
  --shadow-1: 0 1px 2px rgba(20, 22, 28, 0.05), 0 1px 0 rgba(20, 22, 28, 0.02);
  --shadow-2: 0 6px 16px -8px rgba(20, 22, 28, 0.10), 0 2px 4px rgba(20, 22, 28, 0.04);
  --shadow-3: 0 16px 40px -16px rgba(20, 22, 28, 0.18), 0 4px 8px rgba(20, 22, 28, 0.04);
  --shadow-inset: inset 0 0 0 1px rgba(20, 22, 28, 0.06);

  /* Motion */
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-inout: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast: 120ms;
  --dur-base: 200ms;
  --dur-slow: 380ms;
}

/* ============================================================
   SUB-BRAND TOKEN PACKS
   Apply to a wrapper to switch the page into a project palette.
   Usage: <section data-brand="la-palma">…</section>
   Each pack defines:
     --brand-primary, --brand-primary-soft, --brand-ink,
     --brand-accent, --brand-surface,
     --brand-font-display, --brand-font-body
   ============================================================ */

/* La Palma Paracas — costa, palmera, verde profundo
   NOTE: brief said "verde turquesa" but the supplied logo is a
   deep forest green. Using the actual logo color. */
[data-brand="la-palma"] {
  --brand-primary:      #157A3E;
  --brand-primary-soft: #E5F1EA;
  --brand-ink:          #0E3B22;
  --brand-accent:       #F0C24B;       /* warm sun */
  --brand-surface:      #F6F9F4;
  --brand-font-display: 'Montserrat', sans-serif;
  --brand-font-body:    'Montserrat', sans-serif;
}

/* Valle Sacta — campestre premium, blanco + dorado + caballo */
[data-brand="valle-sacta"] {
  --brand-primary:      #1B1B1B;
  --brand-primary-soft: #F4EFE3;
  --brand-ink:          #14110B;
  --brand-accent:       #B89A6B;       /* gold rule */
  --brand-surface:      #FAF7F0;
  --brand-font-display: 'Playfair Display', serif;
  --brand-font-body:    'Montserrat', sans-serif;
}

/* Altos de Sacta — multicolor, display gruesa, dinámico */
[data-brand="altos-sacta"] {
  --brand-primary:      #0E0E0E;       /* black wedge */
  --brand-primary-soft: #FFF6E0;
  --brand-ink:          #0E0E0E;
  --brand-accent:       #F2A02D;       /* orange — dominant */
  --brand-accent-2:     #3CB4E5;       /* sky blue */
  --brand-accent-3:     #7AB23A;       /* leaf green */
  --brand-surface:      #FFFCF5;
  --brand-font-display: 'Playfair Display', serif; /* matches logo */
  --brand-font-body:    'Montserrat', sans-serif;
}

/* Sol de Carhuaz — arena, sol, agua, manuscrita */
[data-brand="sol-carhuaz"] {
  --brand-primary:      #6B4127;       /* brown script */
  --brand-primary-soft: #F5E9DC;
  --brand-ink:          #3D2515;
  --brand-accent:       #D45F2E;       /* terracota sun */
  --brand-accent-2:     #62C6D6;       /* aqua */
  --brand-surface:      #FBF4EA;
  --brand-font-display: 'Caveat', 'Montserrat', cursive; /* substitute for the script */
  --brand-font-body:    'Montserrat', sans-serif;
}

/* Monte Alegre — rojo dominante + naranja, popular masivo */
[data-brand="monte-alegre"] {
  --brand-primary:      #B91E1F;
  --brand-primary-soft: #FCE5E3;
  --brand-ink:          #6E0F0F;
  --brand-accent:       #F2A02D;
  --brand-accent-2:     #F4D547;       /* yellow sun */
  --brand-surface:      #FFF6F2;
  --brand-font-display: 'Montserrat', sans-serif; /* matches logo wide sans */
  --brand-font-body:    'Montserrat', sans-serif;
}

/* Los Sauces — entry level, olivo + dorado */
[data-brand="los-sauces"] {
  --brand-primary:      #6F7B3F;       /* olive */
  --brand-primary-soft: #EFF1DF;
  --brand-ink:          #2C1A0E;       /* dark brown */
  --brand-accent:       #E2A93B;       /* tag color */
  --brand-surface:      #FAF8EF;
  --brand-font-display: 'Playfair Display', serif;
  --brand-font-body:    'Montserrat', sans-serif;
}

/* ============================================================
   ELEMENT-LEVEL SEMANTIC TYPOGRAPHY
   Default to the corporate (CEINYS) typography. Sub-branded
   sections override via .brand-headline if they want display
   to swap to their brand font.
   ============================================================ */

html, body {
  font-family: var(--font-sans);
  font-size: 16px;
  color: var(--fg-1);
  background: var(--bg-1);
  line-height: var(--lh-base);
  font-feature-settings: "ss01", "cv11";
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
}

.display, h1.display {
  font-family: var(--font-display);
  font-size: var(--fs-display);
  font-weight: 700;
  letter-spacing: var(--tracking-tight);
  line-height: var(--lh-tight);
  color: var(--fg-1);
}

h1, .h1 {
  font-family: var(--font-sans);
  font-size: var(--fs-h1);
  font-weight: 700;
  line-height: var(--lh-snug);
  letter-spacing: -0.01em;
  color: var(--fg-1);
  text-wrap: balance;
}
h2, .h2 {
  font-family: var(--font-sans);
  font-size: var(--fs-h2);
  font-weight: 700;
  line-height: var(--lh-snug);
  letter-spacing: -0.005em;
  color: var(--fg-1);
  text-wrap: balance;
}
h3, .h3 { font-size: var(--fs-h3); font-weight: 600; line-height: 1.3; color: var(--fg-1); }
h4, .h4 { font-size: var(--fs-h4); font-weight: 600; line-height: 1.35; color: var(--fg-1); }
h5, .h5 { font-size: var(--fs-h5); font-weight: 600; line-height: 1.4; color: var(--fg-1); }

p { font-size: var(--fs-body); line-height: var(--lh-base); color: var(--fg-2); text-wrap: pretty; }
p.lead { font-size: 1.125rem; line-height: 1.6; color: var(--fg-2); }
small, .small { font-size: var(--fs-small); color: var(--fg-3); }

.eyebrow {
  font-family: var(--font-display);
  font-size: var(--fs-meta);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: var(--tracking-wide);
  color: var(--accent-primary);
}

.brand-headline {
  font-family: var(--brand-font-display, var(--font-sans));
  color: var(--brand-ink, var(--fg-1));
}

code, kbd, .mono {
  font-family: var(--font-mono);
  font-size: 0.9em;
  color: var(--fg-2);
}

a { color: var(--accent-primary); text-decoration: none; transition: color var(--dur-fast) var(--ease-out); }
a:hover { color: var(--ceinys-cian-700); text-decoration: underline; text-underline-offset: 3px; }

::selection { background: var(--ceinys-cian-100); color: var(--grafito-900); }

hr { border: 0; border-top: 1px solid var(--border-soft); margin: var(--space-7) 0; }


* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin: 0; }

/* =====================================================
   LAYOUT PRIMITIVES
   ===================================================== */
.container { max-width: var(--container-max); margin: 0 auto; padding: 0 var(--gutter); }
.container-narrow { max-width: var(--container-narrow); margin: 0 auto; padding: 0 var(--gutter); }

section { padding: var(--space-11) 0; }
section.tight { padding: var(--space-9) 0; }
section.bone { background: var(--bone); }
section.paper { background: var(--paper); }
section.ink { background: var(--bg-ink); color: white; }
section.ink h1, section.ink h2, section.ink h3 { color: white; }
section.ink p { color: rgba(255,255,255,0.78); }

/* eyebrow with rule */
.eyebrow {
  display: inline-flex; align-items: center; gap: 12px;
  font-family: var(--font-display);
  font-size: var(--fs-meta); font-weight: 600;
  text-transform: uppercase; letter-spacing: var(--tracking-wide);
  color: var(--accent-primary);
  margin-bottom: var(--space-4);
}
.eyebrow::before { content: ''; width: 32px; height: 1.5px; background: currentColor; }
section.ink .eyebrow { color: var(--ceinys-cian-500); }

/* =====================================================
   BUTTONS
   ===================================================== */
.btn {
  font: 600 14px/1 var(--font-sans);
  padding: 14px 22px; border-radius: var(--radius-md);
  border: 0; cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  transition: all var(--dur-base) var(--ease-out);
  white-space: nowrap; text-decoration: none;
}
.btn svg { width: 16px; height: 16px; stroke-width: 2; }
.btn-primary { background: var(--accent-action); color: white; }
.btn-primary:hover { background: var(--accent-action-hover); transform: translateY(-1px); box-shadow: var(--shadow-2); color: white; text-decoration: none; }
.btn-secondary { background: var(--grafito-900); color: white; }
.btn-secondary:hover { background: var(--grafito-800); transform: translateY(-1px); color: white; text-decoration: none; }
.btn-ghost { background: transparent; color: var(--grafito-800); border: 1px solid var(--grafito-300); }
.btn-ghost:hover { background: var(--grafito-100); border-color: var(--grafito-400); color: var(--grafito-900); text-decoration: none; }
.btn-ghost-light { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.55); }
.btn-ghost-light:hover { background: rgba(255,255,255,0.10); border-color: white; color: white; text-decoration: none; }
.btn-link {
  background: transparent; color: var(--ceinys-cian-600);
  padding: 0; font: 600 14px/1 var(--font-sans);
  border: 0; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
}
.btn-link:hover { color: var(--ceinys-cian-700); text-decoration: underline; text-underline-offset: 4px; }

/* =====================================================
   HEADER — sticky, blur, mobile hamburger
   ===================================================== */
.header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px) saturate(120%);
  -webkit-backdrop-filter: blur(12px) saturate(120%);
  border-bottom: 1px solid transparent;
  transition: border-color var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);
}
.header.scrolled { border-bottom-color: var(--border-soft); box-shadow: var(--shadow-1); }
.header-inner { display: flex; align-items: center; justify-content: space-between; height: 76px; gap: 24px; }
.header-logo { display: flex; align-items: center; cursor: pointer; }
.header-logo img { height: 48px; display: block; }
.header-nav { display: flex; gap: 32px; }
.header-nav a {
  font: 500 14px/1 var(--font-sans); color: var(--grafito-700);
  cursor: pointer; padding: 8px 0; position: relative;
  text-decoration: none;
}
.header-nav a::after {
  content: ''; position: absolute; left: 0; right: 100%; bottom: 0;
  height: 2px; background: var(--ceinys-cian-500); border-radius: 1px;
  transition: right var(--dur-base) var(--ease-out);
}
.header-nav a:hover { color: var(--grafito-900); text-decoration: none; }
.header-nav a:hover::after { right: 0; }
.header-burger {
  display: none; background: transparent; border: 0; padding: 8px;
  cursor: pointer; color: var(--grafito-900);
}
.header-burger svg { width: 28px; height: 28px; stroke-width: 1.5; }

@media (max-width: 960px) {
  .header-nav, .header-cta-desktop { display: none; }
  .header-burger { display: flex; }
}

/* Mobile fullscreen overlay (Albamar reference, grafito instead of azul) */
.mobile-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: var(--grafito-900);
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity var(--dur-slow) var(--ease-out);
}
.mobile-overlay.open { opacity: 1; pointer-events: auto; }
.mobile-overlay-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 22px var(--gutter); height: 76px;
}
.mobile-overlay-head img { height: 38px; filter: brightness(0) invert(1); }
.mobile-overlay-close {
  background: transparent; border: 0; color: white; cursor: pointer; padding: 8px;
}
.mobile-overlay-close svg { width: 28px; height: 28px; stroke-width: 1.5; }
.mobile-overlay-nav {
  flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
  gap: 28px; padding: 40px var(--gutter);
}
.mobile-overlay-nav a {
  font: 600 28px/1.1 var(--font-sans); color: white; text-decoration: none;
  letter-spacing: -0.005em;
  opacity: 0; transform: translateY(12px);
  transition: opacity 380ms var(--ease-out), transform 380ms var(--ease-out), color 160ms var(--ease-out);
}
.mobile-overlay.open .mobile-overlay-nav a { opacity: 1; transform: translateY(0); }
.mobile-overlay-nav a:hover { color: var(--ceinys-cian-500); }
.mobile-overlay-foot {
  padding: 24px var(--gutter) 40px;
  display: flex; flex-direction: column; align-items: center; gap: 24px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.mobile-overlay-foot .btn-ghost-light { width: 100%; max-width: 320px; justify-content: center; padding: 16px 22px; }
.mobile-overlay-social { display: flex; gap: 12px; }
.mobile-overlay-social a {
  width: 40px; height: 40px; border-radius: 999px;
  background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center;
  color: white; transition: background var(--dur-fast) var(--ease-out);
}
.mobile-overlay-social a:hover { background: rgba(255,255,255,0.18); }
.mobile-overlay-social svg { width: 18px; height: 18px; }

/* =====================================================
   HERO
   ===================================================== */
.hero {
  position: relative; min-height: 88vh; max-height: 820px;
  display: flex; align-items: flex-end;
  color: white;
  overflow: hidden;
  background: var(--grafito-900);
}
.hero-bg {
  position: absolute; inset: 0;
  background-image: url("./images/heroBackground2.jpg");
  background-size: cover; background-position: center;
  transform: scale(1.04);
}
.hero-bg::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(20,22,28,0.35) 0%, rgba(20,22,28,0.55) 55%, rgba(20,22,28,0.82) 100%);
}
.hero-inner {
  position: relative; z-index: 2;
  padding: 0 0 var(--space-11);
  max-width: 920px;
}
.hero .eyebrow { color: var(--ceinys-cian-500); }
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 5.2vw, 4.5rem);
  font-weight: 800; line-height: 1.04;
  letter-spacing: -0.02em;
  color: white; margin: 0 0 22px;
  text-wrap: balance;
}
.hero h1 em { font-style: normal; color: var(--ceinys-cian-500); }
.hero .lead {
  font-size: clamp(1rem, 1.3vw, 1.18rem);
  line-height: 1.6; color: rgba(255,255,255,0.85);
  max-width: 640px; margin: 0 0 36px;
}
.hero-ctas { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
.hero-meta {
  position: absolute; right: var(--gutter); bottom: var(--space-11); z-index: 2;
  font: 500 11px/1.6 var(--font-mono);
  color: rgba(255,255,255,0.6); text-align: right;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.hero-meta strong { color: white; font-weight: 600; }
@media (max-width: 720px) {
  .hero { min-height: 78vh; align-items: flex-end; }
  .hero-meta { display: none; }
}

/* =====================================================
   STATS BANDA
   ===================================================== */
.stats-banda {
  background: var(--bone);
  border-top: 1px solid var(--border-soft);
  border-bottom: 1px solid var(--border-soft);
}
.stats-banda .container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding-top: var(--space-9); padding-bottom: var(--space-9);
  gap: 0;
  max-width: 1120px;
}
.stat {
  position: relative;
  padding: 0 var(--space-7);
}
.stat:not(:last-child)::after {
  content: '';
  position: absolute;
  right: 0; top: 30%; bottom: 30%;
  width: 1px;
  background: var(--grafito-200);
}
.stat:first-child { padding-left: 0; }
.stat:last-child  { padding-right: 0; }
.stat-num {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 4.6vw, 4rem);
  font-weight: 800; line-height: 1;
  color: var(--grafito-900);
  letter-spacing: -0.03em;
  display: flex; align-items: baseline; gap: 4px;
}
.stat-num .unit {
  font-size: 0.5em; font-weight: 700; color: var(--accent-action);
  letter-spacing: 0;
}
.stat-lbl {
  font: 500 14px/1.45 var(--font-sans);
  color: var(--grafito-600);
  margin-top: 12px; max-width: 220px;
}
@media (max-width: 860px) {
  .stats-banda .container { grid-template-columns: repeat(2, 1fr); row-gap: var(--space-7); }
  .stat { padding: 0 var(--space-5); }
  .stat:not(:last-child)::after { display: none; }
  .stat:nth-child(odd)::after {
    content: ''; position: absolute; right: 0; top: 30%; bottom: 30%;
    width: 1px; background: var(--grafito-200); display: block;
  }
}

/* =====================================================
   SECTION HEADER
   ===================================================== */
.sec-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  gap: var(--space-8); margin-bottom: var(--space-9); flex-wrap: wrap;
}
.sec-head h2 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 3.6vw, 3rem);
  font-weight: 800; letter-spacing: -0.015em; line-height: 1.08;
  margin: 0; max-width: 640px;
}
.sec-head p { max-width: 420px; margin: 0; color: var(--grafito-600); }

/* =====================================================
   PROJECT CARDS (adapted Los Portales structure)
   ===================================================== */
.cards-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: var(--space-7);
}
@media (max-width: 1080px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 700px)  { .cards-grid { grid-template-columns: 1fr; } }

.pcard {
  background: white;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: border-color var(--dur-base) var(--ease-out),
              box-shadow var(--dur-base) var(--ease-out),
              transform var(--dur-base) var(--ease-out);
}
.pcard:hover {
  border-color: var(--grafito-300);
  box-shadow: var(--shadow-2);
  transform: translateY(-2px);
}
.pcard:hover .pcard-img img { transform: scale(1.04); }

.pcard-media {
  position: relative;
  aspect-ratio: 4/3;
  overflow: hidden;
  background: var(--grafito-100);
}
.pcard-img { position: absolute; inset: 0; }
.pcard-img img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 600ms var(--ease-out);
}
.pcard-img::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(20,22,28,0.18) 0%, rgba(20,22,28,0) 50%);
}

/* chip top-left — categoría */
.pcard-chip {
  position: absolute; top: 16px; left: 0;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px 10px 18px;
  background: var(--grafito-900); color: white;
  font: 600 11px/1 var(--font-display);
  text-transform: uppercase; letter-spacing: var(--tracking-wide);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  z-index: 2;
}
.pcard-chip svg { width: 13px; height: 13px; stroke-width: 2; }
.pcard-chip[data-tone="venta"]    { background: var(--accent-action); }
.pcard-chip[data-tone="proximo"]  { background: var(--ceinys-cian-600); }
.pcard-chip[data-tone="etapa"]    { background: var(--color-success); }

/* pin top-right — ubicación */
.pcard-pin {
  position: absolute; top: 16px; right: 16px;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(6px);
  color: var(--grafito-800);
  font: 600 12px/1 var(--font-sans);
  border-radius: var(--radius-pill);
  z-index: 2;
  box-shadow: var(--shadow-1);
}
.pcard-pin svg { width: 13px; height: 13px; stroke-width: 2; color: var(--accent-action); }

/* name band */
.pcard-name {
  padding: 18px 22px 16px;
  border-bottom: 1px solid var(--border-soft);
  position: relative;
}
.pcard-name::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; background: var(--brand-accent, var(--ceinys-cian-500));
}
.pcard-name h3 {
  font-family: var(--font-sans);
  font-size: 22px; font-weight: 700; letter-spacing: -0.01em;
  line-height: 1.15; margin: 0 0 4px; color: var(--grafito-900);
}
.pcard-sub {
  font: 400 13px/1.5 var(--font-sans);
  color: var(--grafito-600); margin: 0;
}

/* actions bar — small secondary + main primary */
.pcard-actions {
  display: grid; grid-template-columns: 1fr 1.4fr;
}
.pcard-act {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 18px 16px;
  font: 600 13px/1.2 var(--font-sans);
  cursor: pointer; border: 0; background: transparent;
  text-decoration: none; text-align: center;
  transition: background var(--dur-fast) var(--ease-out);
}
.pcard-act svg { width: 14px; height: 14px; stroke-width: 2; }
.pcard-act.secondary {
  color: var(--grafito-700);
  background: var(--bone);
}
.pcard-act.secondary:hover { background: var(--grafito-100); color: var(--grafito-900); }
.pcard-act.primary {
  background: var(--grafito-900); color: white;
}
.pcard-act.primary:hover { background: var(--grafito-800); }

/* sub-brand accent stripe colors via data-brand */
.pcard[data-brand="la-palma"] .pcard-name::before    { background: #157A3E; }
.pcard[data-brand="sol-carhuaz"] .pcard-name::before { background: #D45F2E; }
.pcard[data-brand="monte-alegre"] .pcard-name::before{ background: #B91E1F; }
.pcard[data-brand="valle-sacta"] .pcard-name::before { background: #B89A6B; }
.pcard[data-brand="altos-sacta"] .pcard-name::before { background: #F2A02D; }

/* =====================================================

   ===================================================== */
.pillars {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: var(--space-7);
}
@media (max-width: 980px) { .pillars { grid-template-columns: repeat(2, 1fr); gap: var(--space-7); } }
@media (max-width: 560px) { .pillars { grid-template-columns: 1fr; } }

.pillar {
  padding-top: var(--space-5);
  border-top: 1.5px solid var(--grafito-900);
}
.pillar-icon {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;

  margin-bottom: var(--space-5);
}
.pillar-icon svg { width: 30px; height: 30px; stroke-width: 1.5; }
.pillar h4 {
  font: 700 18px/1.25 var(--font-sans);

/* =====================================================
   COBERTURA — mapa + lista
   ===================================================== */
.coverage {
  display: grid; grid-template-columns: 1.05fr 1fr;
  gap: var(--space-10); align-items: center;
}

.map-wrap {
  position: relative;

  border: 1px solid var(--border-soft);
  border-radius: var(--radius-lg);
  overflow: hidden;
  aspect-ratio: 1 / 1.05;
}
.map-wrap .map-grid,
.map-wrap .map-connector {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.map-wrap .map-connector { z-index: 1; }

.map-zone-card {
  position: absolute; z-index: 2;
  display: flex; align-items: flex-start; gap: 12px;
  background: white;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  box-shadow: var(--shadow-2);
  min-width: 188px;
  transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);
}
.map-zone-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-3); }
.map-zone-icon {
  width: 32px; height: 32px; border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.map-zone-icon svg { width: 17px; height: 17px; stroke-width: 2; }
.map-zone-icon[data-tone="naranja"] { background: var(--ceinys-naranja-050); color: var(--ceinys-naranja-600); }
.map-zone-icon[data-tone="cian"]    { background: var(--ceinys-cian-050);    color: var(--ceinys-cian-600); }
.map-zone-name {
  font: 700 14px/1.2 var(--font-sans);
  color: var(--grafito-900);
  letter-spacing: -0.005em;
}
.map-zone-count {
  font: 600 11px/1 var(--font-display);
  text-transform: uppercase; letter-spacing: var(--tracking-wide);
  color: var(--grafito-500);
  margin-top: 4px;
}
.map-zone-coords {
  font: 400 11px/1 var(--font-mono);
  color: var(--grafito-500);
  margin-top: 6px;
  letter-spacing: 0.02em;
}

@media (max-width: 540px) {
  .map-wrap { aspect-ratio: 1 / 0.9; }
  .map-zone-card { min-width: 0; padding: 10px 12px; gap: 10px; }
  .map-zone-name { font-size: 13px; }
}

/* Tighten gap between Cobertura and Referidos */
.cobertura-sec { padding-bottom: var(--space-9); }

.coverage-list { display: flex; flex-direction: column; gap: var(--space-6); }
.coverage-zone {
  border-left: 2px solid var(--accent-action);

}
.coverage-zone .label {
  font: 600 11px/1 var(--font-display);

  color: var(--accent-action); margin-bottom: 6px;
}
.coverage-zone h4 {
  font: 700 22px/1.15 var(--font-sans);

  list-style: none; margin: 0; padding: 0;

}
.coverage-zone li {

}
.coverage-zone li::before {
  content: '·'; color: var(--grafito-400); font-weight: 700;

/* =====================================================

   ===================================================== */
.referidos {
  background: var(--bone);

  border-bottom: 1px solid var(--border-soft);
}
.referidos .container {

.referidos-text p { margin: 0; max-width: 620px; color: var(--grafito-600); }
